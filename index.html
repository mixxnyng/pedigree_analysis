<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상염색체 열성 가계도 시뮬레이터</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { border-bottom: 2px solid #e1e4e8; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 22px; color: #2c3e50; }
        
        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        .sidebar { width: 300px; min-width: 300px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        .content { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 0; }
        
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .control-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .metric-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #3498db; }
        .metric-card.accuracy { border-left-color: #2ecc71; }
        .metric-title { font-size: 12px; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; }
        .metric-value { font-size: 18px; font-weight: bold; color: #2c3e50; }

        .tabs { display: flex; gap: 10px; margin-bottom: 0; border-bottom: 1px solid #ccc; }
        .tab-btn { background: none; color: #7f8c8d; border: none; padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-size: 14px; font-weight: bold; }
        .tab-btn.active { color: #2c3e50; border-bottom-color: #3498db; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }

        .plot-container { width: 100%; min-height: 650px; background: #f8f9fa; border: 1px solid #e1e4e8; border-radius: 6px; position: relative; }
        #pedigree-plot { width: 100%; height: 650px; }
        
        .charts-row { display: flex; gap: 20px; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        .chart-box { flex: 1; border: 1px solid #e1e4e8; border-radius: 6px; padding: 0; min-width: 0; background: white; overflow: hidden; box-sizing: border-box; }
        .chart-inner { width: 100%; height: 380px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e1e4e8; font-size: 14px; }
        th { background-color: #f8f9fa; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>상염색체 가계도 시뮬레이터 및 유전 데이터 분석기</h1>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <h3 style="margin-top:0; color:#2c3e50;">컨트롤 센터</h3>
            <hr style="border:0; border-top:1px solid #eee; margin-bottom:15px;">
            <div class="control-group">
                <label for="seed">유전 시드 (Seed)</label>
                <input type="number" id="seed" value="45" oninput="initSimulation()">
            </div>
            <div class="control-group">
                <label for="gens">가계도 추적 세대수</label>
                <input type="number" id="gens" value="5" min="2" max="12" oninput="initSimulation()">
            </div>
            <div class="control-group">
                <label for="min-kids">부부당 최소 자녀</label>
                <input type="number" id="min-kids" value="1" min="1" max="3" oninput="initSimulation()">
            </div>
            <div class="control-group">
                <label for="max-kids">부부당 최대 자녀</label>
                <input type="number" id="max-kids" value="3" min="1" max="4" oninput="initSimulation()">
            </div>
            <p style="font-size: 12px; color: #95a5a6; margin-top: 20px; line-height: 1.4;">* 값을 변경하면 실시간으로 자동 연산되어 그래프에 즉시 반영됩니다.</p>
        </div>

        <div class="content">
            <div class="metrics-grid">
                <div class="metric-card"><div class="metric-title">총 인구 규모</div><div class="metric-value" id="m-total">0명</div></div>
                <div class="metric-card"><div class="metric-title">발병 환자 (남 / 여)</div><div class="metric-value" id="m-affected">남: 0 / 여: 0</div></div>
                <div class="metric-card"><div class="metric-title">실제 보인자 (남 / 여)</div><div class="metric-value" id="m-carrier">남: 0 / 여: 0</div></div>
                <div class="metric-card accuracy"><div class="metric-title">DFS 알고리즘 정확도</div><div class="metric-value" id="m-accuracy">0.0%</div></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'tab-pedigree')">가계도 네트워크 구조도</button>
                <button class="tab-btn" onclick="switchTab(event, 'tab-report')">유전 데이터 분석 리포트</button>
            </div>

            <div id="tab-pedigree" class="tab-content active">
                <div class="plot-container">
                    <div id="pedigree-plot"></div>
                </div>
            </div>

            <div id="tab-report" class="tab-content">
                <div class="charts-row">
                    <div class="chart-box"><div id="pie-chart" class="chart-inner"></div></div>
                    <div class="chart-box"><div id="bar-chart" class="chart-inner"></div></div>
                </div>
                <h3 style="margin-top:20px; color:#2c3e50;">개체별 유전형 및 알고리즘 판별 데이터 목록</h3>
                <div style="overflow-x:auto;">
                    <table id="data-table">
                        <thead>
                            <tr>
                                <th>가계도 ID</th><th>세대</th><th>성별</th><th>실제 유전자형</th><th>표현형 상태</th><th>알고리즘 추론 확률</th><th>실제 보인자 여부</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');

        // 탭이 화면에 나타난 "직후" 크기를 기준으로 다시 그려야
        // 숨겨진 상태(display:none)에서 잘못 계산된 크기가 남는 문제가 생기지 않는다.
        requestAnimationFrame(() => {
            const pedPlot = document.getElementById('pedigree-plot');
            if (pedPlot && pedPlot.layout) Plotly.Plots.resize(pedPlot);

            if (tabId === 'tab-report') {
                renderReportCharts();
            }
        });
    }

    class SeededRandom {
        constructor(seed) { this.seed = seed; }
        next() {
            let t = this.seed += 0x6D2B79F5;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        }
        randint(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
        choice(arr) { return arr[Math.floor(this.next() * arr.length)]; }
    }

    let nextId = 0;
    let people = {};
    let childrenMap = {};
    let parentsMap = {};

    function addPerson(sex, genotype, generation) {
        let pid = nextId++;
        let sortedGenotype = [...genotype].sort();
        let phenotype = (sortedGenotype[0] === 'a' && sortedGenotype[1] === 'a') ? 'Affected' : 'Unaffected';
        let trueCarrier = (sortedGenotype[0] === 'A' && sortedGenotype[1] === 'a');
        
        people[pid] = { pid, sex, genotype: sortedGenotype, generation, phenotype, trueCarrier };
        childrenMap[pid] = [];
        parentsMap[pid] = [];
        return pid;
    }

    function addParentChild(pId, cId) {
        if(!childrenMap[pId].includes(cId)) childrenMap[pId].push(cId);
        if(!parentsMap[cId].includes(pId)) parentsMap[cId].push(pId);
    }

    function makeChildGenotype(father, mother, rng) {
        let paternal = rng.choice(father.genotype);
        let maternal = rng.choice(mother.genotype);
        return [paternal, maternal].sort();
    }

    function initSimulation() {
        nextId = 0; people = {}; childrenMap = {}; parentsMap = {};
        
        let seed = parseInt(document.getElementById('seed').value);
        let nGens = parseInt(document.getElementById('gens').value);
        let minKids = parseInt(document.getElementById('min-kids').value);
        let maxKids = parseInt(document.getElementById('max-kids').value);
        
        if (isNaN(seed) || isNaN(nGens) || isNaN(minKids) || isNaN(maxKids)) return;
        if (minKids > maxKids) {
            maxKids = minKids;
            document.getElementById('max-kids').value = maxKids;
        }

        let rng = new SeededRandom(seed);
        let familyUnits = [];

        let fId = addPerson('M', ['A', 'a'], 0);
        let mId = addPerson('F', ['A', 'a'], 0);
        let currentGenCouples = [[fId, mId]];

        for (let gen = 1; gen < nGens; gen++) {
            let nextGenCouples = [];
            for (let [fatherId, motherId] of currentGenCouples) {
                let father = people[fatherId];
                let mother = people[motherId];
                let nKids = rng.randint(minKids, maxKids);
                let kidsIds = [];

                for (let k = 0; k < nKids; k++) {
                    let sex = rng.choice(['M', 'F']);
                    let genotype = makeChildGenotype(father, mother, rng);
                    let childId = addPerson(sex, genotype, gen);
                    addParentChild(fatherId, childId);
                    addParentChild(motherId, childId);
                    kidsIds.push(childId);

                    if (gen < nGens - 1) {
                        let spouseSex = sex === 'M' ? 'F' : 'M';
                        let randVal = rng.next();
                        let spouseGenotype = randVal < 0.05 ? ['a', 'a'] : (randVal < 0.35 ? ['A', 'a'] : ['A', 'A']);
                        let spouseId = addPerson(spouseSex, spouseGenotype, gen);

                        if (sex === 'M') nextGenCouples.push([childId, spouseId]);
                        else nextGenCouples.push([spouseId, childId]);
                    }
                }
                if (kidsIds.length > 0) familyUnits.push([gen - 1, fatherId, motherId, kidsIds]);
            }
            currentGenCouples = nextGenCouples;
            if (currentGenCouples.length === 0) break;
        }

        let inferred = {};
        let affectedIds = Object.keys(people).filter(pid => people[pid].phenotype === 'Affected');
        
        for (let affId of affectedIds) {
            let stack = parentsMap[affId].map(p => [p, 1.0]);
            let localVisited = new Set();
            while(stack.length > 0) {
                let [pid, prob] = stack.pop();
                if (localVisited.has(pid)) continue;
                localVisited.add(pid);
                inferred[pid] = Math.max(inferred[pid] || 0.0, prob);

                for (let parentId of parentsMap[pid]) {
                    if (!localVisited.has(parentId)) stack.push([parentId, prob * 0.5]);
                    for (let sibId of childrenMap[parentId]) {
                        if (!localVisited.has(sibId) && sibId != pid) stack.push([sibId, prob * 0.5]);
                    }
                }
            }
        }

        updateDashboardAndCharts(familyUnits, inferred);
    }

    function updateDashboardAndCharts(familyUnits, inferred) {
        let pList = Object.values(people);
        let nTotal = pList.length;
        let affM = pList.filter(p => p.phenotype === 'Affected' && p.sex === 'M').length;
        let affF = pList.filter(p => p.phenotype === 'Affected' && p.sex === 'F').length;
        let carM = pList.filter(p => p.trueCarrier && p.sex === 'M').length;
        let carF = pList.filter(p => p.trueCarrier && p.sex === 'F').length;

        let tp = 0, tn = 0;
        pList.forEach(p => {
            let pred = (inferred[p.pid] || 0.0) >= 0.5;
            if (pred && p.trueCarrier) tp++;
            else if (!pred && !p.trueCarrier) tn++;
        });
        let accuracy = nTotal ? ((tp + tn) / nTotal) * 100 : 0;

        document.getElementById('m-total').innerText = `${nTotal}명`;
        document.getElementById('m-affected').innerText = `남: ${affM}명 / 여: ${affF}명`;
        document.getElementById('m-carrier').innerText = `남: ${carM}명 / 여: ${carF}명`;
        document.getElementById('m-accuracy').innerText = `${accuracy.toFixed(1)}%`;

        let pos = {};
        let childrenOf = {};
        let spouseOf = {};

        familyUnits.forEach(([gen, f, m, kids]) => {
            childrenOf[`${f},${m}`] = kids;
            spouseOf[f] = m;
            spouseOf[m] = f;
        });

        let X_GAP = 12, Y_GAP = 8, cursor = 0;

        function placeFamily(father, mother) {
            let kids = childrenOf[`${father},${mother}`] || [];
            if (kids.length === 0) {
                let x = cursor * X_GAP;
                cursor += 1;
                let y = -people[father].generation * Y_GAP;
                pos[father] = [x - 2, y];
                pos[mother] = [x + 2, y];
                return x;
            }

            let childCenters = [];
            kids.forEach(child => {
                let spouse = spouseOf[child];
                if (spouse !== undefined) {
                    if (people[child].sex === "M") childCenters.push(placeFamily(child, spouse));
                    else childCenters.push(placeFamily(spouse, child));
                } else {
                    let cx = cursor * X_GAP;
                    cursor += 1;
                    pos[child] = [cx, -people[child].generation * Y_GAP];
                    childCenters.push(cx);
                }
            });

            let center = (Math.min(...childCenters) + Math.max(...childCenters)) / 2;
            let y = -people[father].generation * Y_GAP;
            pos[father] = [center - 2, y];
            pos[mother] = [center + 2, y];
            return center;
        }

        if (familyUnits.length > 0) {
            let [_, f, m, __] = familyUnits[0];
            placeFamily(f, m);
        }

        pList.forEach(p => {
            if (pos[p.pid] === undefined) {
                pos[p.pid] = [cursor * X_GAP, -p.generation * Y_GAP];
                cursor += 1;
            }
        });

        let byGen = {};
        Object.keys(pos).forEach(pid => {
            let gen = people[pid].generation;
            if (!byGen[gen]) byGen[gen] = [];
            byGen[gen].push([pos[pid][0], pid]);
        });

        let labels = {};
        Object.keys(byGen).forEach(gen => {
            byGen[gen].sort((a, b) => a[0] - b[0]);
            byGen[gen].forEach((item, idx) => {
                labels[item[1]] = `${parseInt(gen) + 1}-${idx + 1}`;
            });
        });

        renderPlots(familyUnits, pos, labels, inferred);
    }

    function renderPlots(familyUnits, pos, labels, inferred) {
        let edgeX = [], edgeY = [];

        familyUnits.forEach(([gen, fId, mId, children]) => {
            if (!pos[fId] || !pos[mId]) return;
            let [xf, yf] = pos[fId], [xm, ym] = pos[mId];

            edgeX.push(xf, xm, null); edgeY.push(yf, ym, null);
            if (!children || children.length === 0) return;

            let validChildren = children.filter(c => pos[c] !== undefined);
            if (validChildren.length === 0) return;

            let coupleX = (xf + xm) / 2;
            let childPoints = validChildren.map(c => pos[c]);
            let childXs = childPoints.map(p => p[0]);
            let childYs = childPoints.map(p => p[1]);
            let childY = childYs.reduce((a, b) => a + b, 0) / childYs.length;
            let junctionY = yf + (childY - yf) * 0.45;

            edgeX.push(coupleX, coupleX, null); edgeY.push(yf, junctionY, null);
            edgeX.push(Math.min(...childXs), Math.max(...childXs), null); edgeY.push(junctionY, junctionY, null);

            childPoints.forEach(([cx, cy]) => {
                edgeX.push(cx, cx, null); edgeY.push(junctionY, cy, null);
            });
        });

        let nodeGroups = {
            "정상 남성": {x:[], y:[], text:[], marker:{symbol:'square', color:'white', line:{color:'#2c3e50', width:2.5}}},
            "보인자 남성": {x:[], y:[], text:[], marker:{symbol:'square', color:'#f1c40f', line:{color:'#d35400', width:2.5}}},
            "환자 남성": {x:[], y:[], text:[], marker:{symbol:'square', color:'#e74c3c', line:{color:'#c0392b', width:2.5}}},
            "추론 보인자 남성": {x:[], y:[], text:[], marker:{symbol:'square', color:'white', line:{color:'#3498db', width:2.5}}},
            "정상 여성": {x:[], y:[], text:[], marker:{symbol:'circle', color:'white', line:{color:'#2c3e50', width:2.5}}},
            "보인자 여성": {x:[], y:[], text:[], marker:{symbol:'circle', color:'#f1c40f', line:{color:'#d35400', width:2.5}}},
            "환자 여성": {x:[], y:[], text:[], marker:{symbol:'circle', color:'#e74c3c', line:{color:'#c0392b', width:2.5}}},
            "추론 보인자 여성": {x:[], y:[], text:[], marker:{symbol:'circle', color:'white', line:{color:'#3498db', width:2.5}}}
        };

        let tableBody = "";
        let typeCounts = {"정상":0, "보인자":0, "환자":0};
        let genotypeCounts = {"AA":0, "Aa":0, "aa":0};

        Object.values(people).forEach(p => {
            let infProb = inferred[p.pid] || 0.0;
            let isInfCarrier = infProb >= 0.5 && !p.trueCarrier && p.phenotype === 'Unaffected';
            let cat = "";
            let status = p.phenotype === 'Affected' ? '환자' : (p.trueCarrier ? '보인자' : '정상');
            
            typeCounts[status]++;
            let gStr = p.genotype.join('').replace("aA", "Aa");
            genotypeCounts[gStr]++;

            let displayId = labels[p.pid] || String(p.pid);

            if(p.sex === 'M') {
                cat = isInfCarrier ? "추론 보인자 남성" : (p.phenotype === 'Affected' ? "환자 남성" : (p.trueCarrier ? "보인자 남성" : "정상 남성"));
            } else {
                cat = isInfCarrier ? "추론 보인자 여성" : (p.phenotype === 'Affected' ? "환자 여성" : (p.trueCarrier ? "보인자 여성" : "정상 여성"));
            }

            if (pos[p.pid]) {
                nodeGroups[cat].x.push(pos[p.pid][0]);
                nodeGroups[cat].y.push(pos[p.pid][1]);
                nodeGroups[cat].text.push(`<b>${displayId}</b><br>성별: ${p.sex}<br>유전자형: ${p.genotype.join('')}<br>표현형: ${p.phenotype}`);
            }

            tableBody += `<tr><td>${displayId}</td><td>${p.generation+1}세대</td><td>${p.sex==='M'?'남성 (M)':'여성 (F)'}</td><td>${gStr}</td><td>${status}</td><td>${(infProb*100).toFixed(1)}%</td><td>${p.trueCarrier?'보인자(True)':'아님(False)'}</td></tr>`;
        });

        document.querySelector("#data-table tbody").innerHTML = tableBody;

        // 리포트 탭 차트는 최신 데이터를 캐시해두고, 탭이 실제로 보일 때 renderReportCharts()에서 그린다.
        lastTypeCounts = typeCounts;
        lastGenotypeCounts = genotypeCounts;
        if (document.getElementById('tab-report').classList.contains('active')) {
            renderReportCharts();
        }

        let traces = [{ x: edgeX, y: edgeY, mode: 'lines', line: {color: '#34495e', width: 2}, hoverinfo: 'none', showlegend: false }];
        for(let [name, group] of Object.entries(nodeGroups)) {
            if(group.x.length === 0) continue;
            traces.push({
                x: group.x, y: group.y, mode: 'markers', name: name, text: group.text, hoverinfo: 'text',
                marker: Object.assign({size: 20}, group.marker)
            });
        }

        Plotly.newPlot('pedigree-plot', traces, {
            xaxis: {visible: false, fixedrange: false}, 
            yaxis: {visible: false, fixedrange: false, scaleanchor: "x", scaleratio: 1},
            plot_bgcolor: '#f8f9fa', 
            margin: {l:40, r:40, t:40, b:40}, 
            hovermode: 'closest',
            dragmode: 'pan'
        }, {
            scrollZoom: true, 
            displayModeBar: true, 
            modeBarButtonsToRemove: ['select2d', 'lasso2d'],
            responsive: true
        });

    }

    let lastTypeCounts = null;
    let lastGenotypeCounts = null;

    function renderReportCharts() {
        if (!lastTypeCounts || !lastGenotypeCounts) return;

        // height를 명시적으로 고정해서, 컨테이너가 숨겨져 있다가 보일 때
        // Plotly가 기본값(450px)으로 잘못 계산해 빈 공간이 남는 문제를 방지한다.
        Plotly.newPlot('pie-chart', [{
            labels: Object.keys(lastTypeCounts), values: Object.values(lastTypeCounts), type: 'pie', hole: .4,
            marker: {colors: ["#2ecc71", "#f1c40f", "#e74c3c"]}
        }], {
            title: "가계 내 표현형 분포 비율",
            height: 380,
            margin: {l:40, r:40, t:60, b:40},
            automargin: true
        }, {responsive: true, displayModeBar: false});

        Plotly.newPlot('bar-chart', [{
            x: Object.keys(lastGenotypeCounts), y: Object.values(lastGenotypeCounts), type: 'bar',
            marker: {color: ["#34495e", "#f39c12", "#c0392b"]}
        }], {
            title: "대립유전형(Genotype) 빈도 분석",
            height: 380,
            margin: {l:50, r:40, t:60, b:50},
            automargin: true,
            xaxis: {title:"유전자형"},
